{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 600px;">
    <h2>Add New Dish</h2>
    <form method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Dish Name</label>
            <input type="text" name="name" class="form-control" required>
        </div>
        <div class="form-group">
            <label>Description (Ingredients, preparation method)</label>
            <textarea name="description" class="form-control" rows="4" required></textarea>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
                <label>Price (?)</label>
                <input type="number" step="0.01" name="price" class="form-control" required>
            </div>
            <div class="form-group">
                <label>Quantity Available</label>
                <input type="number" name="quantity" class="form-control" required>
            </div>
        </div>
        <div class="form-group">
            <label>Category</label>
            <select name="category" class="form-control" required>
                <option value="Home-Cooked">Home-Cooked</option>
                <option value="Organic">Organic</option>
                <option value="Desserts">Desserts</option>
                <option value="Beverages">Beverages</option>
            </select>
        </div>
        <div class="form-group">
            <label>Dietary Type</label>
            <div style="display: flex; gap: 1rem; align-items: center;">
                <input type="radio" name="is_veg" value="true" checked id="veg"> <label for="veg" style="margin: 0;">Vegetarian (Green Dot)</label>
                <input type="radio" name="is_veg" value="false" id="non-veg"> <label for="non-veg" style="margin: 0;">Non-Veg (Red Dot)</label>
            </div>
        </div>
        <div class="form-group">
            <label>Upload Dish Image (Recommended)</label>
            <input type="file" name="image_file" class="form-control" accept="image/*">
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">OR Paste Image URL:</p>
            <input type="text" name="image_url" class="form-control" placeholder="https://...">
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%;">Publish Dish</button>
    </form>
</div>
{% endblock %}
