{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 480px;">
    <div style="text-align: center; margin-bottom: 2rem;">
        <div style="font-size: 3rem;">🌿</div>
        <h2 style="margin: 0.5rem 0 0.3rem;">Create Account</h2>
        <p style="color: var(--text-muted); font-size: 0.95rem;">Join Cloud Kitchen — Order, Cook, or Deliver!</p>
    </div>

    <form method="POST">
        <div class="form-group">
            <label style="font-weight: 600;">👤 Full Name</label>
            <input type="text" name="username" class="form-control" placeholder="e.g. Priya Sharma" required>
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">📱 Mobile Number <span style="color: red;">*</span></label>
            <div style="display: flex; gap: 0.5rem; align-items: center;">
                <span style="background: #f0f0f0; border: 1px solid var(--border-color); padding: 0.75rem 1rem; border-radius: 8px; font-weight: 600; color: #333;">+91</span>
                <input type="tel" name="phone" class="form-control"
                       placeholder="9876543210"
                       pattern="[0-9]{10}" maxlength="10" required
                       style="letter-spacing: 1px; font-size: 1rem; font-weight: 600;">
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">This will be your login credential</p>
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">📧 Email Address <span style="color: var(--text-muted); font-weight: 400; font-size: 0.85rem;">(Optional)</span></label>
            <input type="email" name="email" class="form-control" placeholder="example@gmail.com">
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">📍 Your City / Area</label>
            <input type="text" name="location" class="form-control" placeholder="e.g. Pune, Maharashtra" required>
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">🎯 I want to...</label>
            <select name="role" class="form-control" required>
                <option value="customer">🛒 Order Food (Customer)</option>
                <option value="seller">👨‍🍳 Sell Food (Home Cook)</option>
                <option value="delivery">🛵 Deliver Food (Rider Partner)</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: 10px; margin-top: 0.5rem;">
            Create Account 🚀
        </button>
    </form>

    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--primary-color); font-weight: 600;">Login</a>
    </p>
</div>
{% endblock %}
