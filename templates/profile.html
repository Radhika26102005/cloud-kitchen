{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">My Profile</h2>

    <form method="POST" enctype="multipart/form-data">
        
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ current_user.profile_image }}" alt="Profile Image" 
                 style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-color); margin-bottom: 1rem;">
            <div>
                <label style="font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--primary-color);">
                    📸 Update Profile Picture
                    <input type="file" name="profile_image" accept="image/*" style="display: none;">
                </label>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">Or paste URL:</p>
            <input type="text" name="profile_image_url" class="form-control" placeholder="https://..." style="max-width: 300px; margin: 0 auto;">
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">📱 Mobile Number <span style="color: red;">*</span></label>
            <input type="text" name="phone" class="form-control" value="{{ current_user.phone }}" required>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">Make sure this is your active WhatsApp/Mobile number.</p>
        </div>


        <div class="form-group">
            <label style="font-weight: 600;">👤 Full Name</label>
            <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required>
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">📧 Email Address <span style="color: red;">*</span></label>
            <input type="email" name="email" class="form-control" value="{{ current_user.email or '' }}" required>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">Verification codes are sent to this address.</p>
        </div>


        <div class="form-group">
            <label style="font-weight: 600;">📍 Primary Address / Kitchen Location</label>
            <input type="text" name="location" id="locationInput" class="form-control" value="{{ current_user.location }}" required>
            
            <div style="margin-top: 1rem; position: relative;">
                <div id="profileMap" style="height: 250px; border-radius: 12px; border: 1px solid var(--border-color);"></div>
                <button type="button" onclick="useGPS()" style="position: absolute; bottom: 10px; right: 10px; z-index: 1000; background: white; border: 1px solid #ccc; padding: 0.4rem 0.8rem; border-radius: 50px; font-size: 0.8rem; cursor: pointer; font-weight: 600;">
                    🎯 Set My Current Location
                </button>
            </div>
            <input type="hidden" name="lat" id="lat" value="{{ current_user.lat or '' }}">
            <input type="hidden" name="lng" id="lng" value="{{ current_user.lng or '' }}">
        </div>

        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
            let map = L.map('profileMap').setView([{{ current_user.lat or 28.6139 }}, {{ current_user.lng or 77.2090 }}], 13);
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
            let marker = {% if current_user.lat %} L.marker([{{ current_user.lat }}, {{ current_user.lng }}]).addTo(map) {% else %} null {% endif %};

            map.on('click', function(e) {
                updateLocation(e.latlng.lat, e.latlng.lng);
            });

            function updateLocation(lat, lng) {
                if (marker) map.removeLayer(marker);
                marker = L.marker([lat, lng]).addTo(map);
                document.getElementById('lat').value = lat;
                document.getElementById('lng').value = lng;
                
                // Optional: Reverse geocode to fill text input
                fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lng}`)
                    .then(res => res.json())
                    .then(data => {
                        if (data.display_name) document.getElementById('locationInput').value = data.display_name;
                    });
            }

            function useGPS() {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(pos => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        map.setView([lat, lng], 16);
                        updateLocation(lat, lng);
                    });
                }
            }
        </script>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: 10px; margin-top: 1rem;">
            💾 Save Changes
        </button>
    </form>
</div>
{% endblock %}
