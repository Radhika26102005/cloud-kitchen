{% extends 'base.html' %}

{% block content %}
<div class="form-container" style="max-width: 600px; margin: 2rem auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">My Profile</h2>

    <form method="POST" enctype="multipart/form-data">
        
        <div style="text-align: center; margin-bottom: 2rem;">
            <img src="{{ current_user.profile_image }}" alt="Profile Image" 
                 style="width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary-color); margin-bottom: 1rem;">
            <div>
                <label style="font-size: 0.9rem; font-weight: 600; cursor: pointer; color: var(--primary-color);">
                    📸 Update Profile Picture
                    <input type="file" name="profile_image" accept="image/*" style="display: none;">
                </label>
            </div>
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.5rem;">Or paste URL:</p>
            <input type="text" name="profile_image_url" class="form-control" placeholder="https://..." style="max-width: 300px; margin: 0 auto;">
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">📱 Mobile Number</label>
            <input type="text" class="form-control" value="{{ current_user.phone }}" readonly style="background: #f0f0f0; color: #666; cursor: not-allowed;">
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">Phone number cannot be changed.</p>
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">👤 Full Name</label>
            <input type="text" name="username" class="form-control" value="{{ current_user.username }}" required>
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">📧 Email Address <span style="color: var(--primary-color);">(Optional)</span></label>
            <input type="email" name="email" class="form-control" value="{{ current_user.email or '' }}" placeholder="Add your email address">
            <p style="font-size: 0.8rem; color: var(--text-muted); margin-top: 0.3rem;">Get order receipts and updates via email.</p>
        </div>

        <div class="form-group">
            <label style="font-weight: 600;">📍 Location</label>
            <input type="text" name="location" class="form-control" value="{{ current_user.location }}" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; border-radius: 10px; margin-top: 1rem;">
            💾 Save Changes
        </button>
    </form>
</div>
{% endblock %}
